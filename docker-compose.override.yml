services:
    api:
        build:
            context: .
            target: development
        environment:
            DJAGO_ENV_FILE: .env.local
        env_file:
            - .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

    db:
        env_file:
            - .env.local
        ports:
            - "5432:5432"
