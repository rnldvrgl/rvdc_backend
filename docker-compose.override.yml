version: "3.9"

services:
    web:
        build:
            target: development
        env_file:
            - .env.local
        environment:
            DJANGO_ENV_FILE: .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
        volumes:
            - .:/usr/src/app
            - static_volume:/usr/src/app/static
            - media_volume:/usr/src/app/media
        ports:
            - "8000:8000"

    db:
        image: postgres:17
        env_file:
            - .env.local
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-rvdc_db}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5433:5432"
