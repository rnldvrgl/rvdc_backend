services:
    api:
        build:
            context: .
            target: development
        env_file:
            - .env.local
        environment:
            DJANGO_ENV_FILE: .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:56001"]
        volumes:
            - .:/usr/src/app
        depends_on:
            db:
                condition: service_started
        networks:
            - default
        ports:
            - "56001:56001"


    db:
        env_file:
            - .env.local
        ports:
            - "5432:5432"
        networks:
            - default
