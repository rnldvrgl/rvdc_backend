services:
    api:
        build:
            context: .
            target: development
        env_file:
            - .env.local
        environment:
            DJANGO_ENV_FILE: .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
        volumes:
            - .:/usr/src/app
        depends_on:
            db:
                condition: service_started
            redis:
                condition: service_started

    db:
        env_file:
            - .env.local
        ports:
            - "5432:5432"

    redis:
        ports:
            - "6379:6379"
