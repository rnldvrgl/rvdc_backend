version: "3.9"

services:
    api:
        build:
            target: development
        env_file:
            - .env.local
        environment:
            DJANGO_ENV_FILE: .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

    db:
        ports:
            - "5432:5432"
