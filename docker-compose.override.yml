services:
    api:
        build:
            context: .
            target: development
        env_file:
            - .env.local
        environment:
            DJANGO_ENV_FILE: .env.local
        command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
        volumes:
            - .:/usr/src/app
        depends_on:
            db:
                condition: service_started
        networks:
            - default


    db:
        env_file:
            - .env.local
        ports:
            - "5432:5432"
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_DB: ${DB_NAME}
        networks:
            - default

networks:
    default:
        name: rvdc_net
