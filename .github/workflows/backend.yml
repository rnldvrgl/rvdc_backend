name: Build & Deploy Backend

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t rnldvrgl/rvdc_backend:latest .
          docker push rnldvrgl/rvdc_backend:latest

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to droplet
        run: |
          scp -o StrictHostKeyChecking=no .env.production root@${{ secrets.DROPLET_HOST }}:/srv/rvdc_backend/
          sshpass -p "${{ secrets.DROPLET_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_HOST }} << 'EOF'
            cd /srv/rvdc_backend
            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d
            docker compose --env-file .env.production exec -T api python manage.py collectstatic --noinput
            docker compose --env-file .env.production exec -T api python manage.py migrate --noinput
            docker image prune -f
          EOF

