name: Build & Deploy Backend

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t rnldvrgl/rvdc_backend:latest .
          docker push rnldvrgl/rvdc_backend:latest

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to droplet
        run: |
          sshpass -p "${{ secrets.DROPLET_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_HOST }} << 'EOF'
            cd /srv/rvdc_backend

            # Pull latest images
            docker compose pull

            # Start database first
            docker compose up -d db

            # Start API
            docker compose up -d api

            # Run migrations
            docker compose exec -T api python manage.py migrate --noinput

            # Collect static files
            docker compose exec -T api python manage.py collectstatic --noinput

            # Clean dangling images
            docker image prune -f
          EOF
