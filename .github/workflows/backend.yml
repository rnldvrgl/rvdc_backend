name: Build & Deploy Backend

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repository
      - uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build and push Docker image
      - name: Build & Push Backend Docker Image
        run: |
          docker build -t rnldvrgl/rvdc_backend:latest .
          docker push rnldvrgl/rvdc_backend:latest

      # 4. Install sshpass to run remote commands via password
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # 5. Run deploy.sh on the droplet
      - name: Deploy to Droplet
        run: |
          sshpass -p "${{ secrets.DROPLET_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_HOST }} << 'EOF'
            cd /srv/rvdc_backend
            git pull origin master
            chmod +x ./deploy.sh
            ./deploy.sh
          EOF
