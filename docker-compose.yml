services:
  web:
    build: 
      target: development
    volumes:
      - .:/usr/src/app/
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env.db

  db:
    image: postgres:17.4-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: rvdc_db
      POSTGRES_USER: rvdc_owner
      POSTGRES_PASSWORD: daizuke0908
volumes:
  postgres_data:
