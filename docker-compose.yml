services:
    db:
        image: postgres:16
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-rvdc_owner} -d $${DB_NAME:-rvdc_db}"]
            interval: 10s
            timeout: 5s
            retries: 5

    # redis:
    #     image: redis:7-alpine
    #     restart: unless-stopped
    #     healthcheck:
    #         test: ["CMD", "redis-cli", "ping"]
    #         interval: 10s
    #         timeout: 5s
    #         retries: 5

    api:
        image: rnldvrgl/rvdc_backend:latest
        depends_on:
            db:
                condition: service_healthy
            # redis:
            #     condition: service_healthy


    # go2rtc:
    #     image: alexxit/go2rtc:latest
    #     restart: unless-stopped
    #     volumes:
    #         - /srv/rvdc_backend/go2rtc:/config  # Persist go2rtc config / state

volumes:
    postgres_data:

networks:
    default:
        name: rvdc_net
