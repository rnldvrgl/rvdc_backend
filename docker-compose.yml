services:
    db:
        image: postgres:16
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $DB_NAME"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        image: rnldvrgl/rvdc_backend:latest
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        ports:
            - "8000:8000"
        volumes:
            - /srv/rvdc_backend/media:/app/media  # Map media files to host
            - /srv/rvdc_backend/staticfiles:/app/staticfiles  # Map static files to host
            - /srv/rvdc_backend/backups:/app/backups  # Database backups

    go2rtc:
        image: alexxit/go2rtc:latest
        restart: unless-stopped
        ports:
            - "1984:1984"   # go2rtc web UI + REST API (accessible from browser for HLS/WebRTC)
        volumes:
            - /srv/rvdc_backend/go2rtc:/config  # Persist go2rtc config / state

volumes:
    postgres_data:
