services:
    db:
        image: postgres:16
        environment:
            POSTGRES_DB: ${DB_NAME:-rvdc_db}
            POSTGRES_USER: ${DB_USER:-rvdc_owner}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-rvdc_owner} -d ${DB_NAME:-rvdc_db}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        build:
            context: .
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8000:8000"
        environment:
            DATABASE_URL: ${DATABASE_URL}

volumes:
    postgres_data:

