services:
  web:
    build:
      context: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]

  db:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_USER: rvdc_owner
      POSTGRES_PASSWORD: daizuke0908

volumes:
  postgres_data:
  static_volume:
  media_volume:
  
