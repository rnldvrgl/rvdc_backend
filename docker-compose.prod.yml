services:
  web:
    build:
      target: production
    env_file:
      - .env.production
    environment:
      DJANGO_ENV_FILE: .env.production
    restart: always
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]
    depends_on:
      - db

  db:
    image: postgres:17.4-alpine
    restart: always
    environment:
      POSTGRES_DB: rvdc_db
      POSTGRES_USER: rvdc_owner
      POSTGRES_PASSWORD: daizuke0908
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
