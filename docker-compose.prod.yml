version: "3.9"

services:
    api:
        build:
            context: .
            target: production
        env_file:
            - .env.production
        environment:
            DJANGO_ENV_FILE: .env.production
        command:
            ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]
        volumes:
            - static_volume:/usr/src/app/static
            - media_volume:/usr/src/app/media
        ports:
            - "8000:8000"

volumes:
    static_volume:
    media_volume:
