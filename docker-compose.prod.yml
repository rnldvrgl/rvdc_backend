version: "3.9"

services:
    web:
        build:
            context: .
            target: production
        env_file:
            - .env.production
        environment:
            DJANGO_ENV_FILE: .env.production
        restart: always
        depends_on:
            - db
        volumes:
            - static_volume:/usr/src/app/static
            - media_volume:/usr/src/app/media
        ports:
            - "8000:8000"

    db:
        image: postgres:17
        restart: always
        env_file:
            - .env.production
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
    static_volume:
    media_volume:
