services:
  api:
    env_file:
      - .env.production
    command:
      [
        "daphne",
        "-b",
        "0.0.0.0",
        "-p",
        "55001",
        "--access-log",
        "-",
        "--verbosity",
        "1",
        "config.asgi:application",
      ]
    ports:
      - "55001:55001"
    volumes:
      - /srv/rvdc_backend/staticfiles:/usr/src/app/staticfiles
      - /srv/rvdc_backend/media:/usr/src/app/media
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/host-logs
      - /srv/rvdc_backend/go2rtc:/go2rtc-config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  celery:
    env_file:
      - .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    env_file:
      - .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    env_file:
      - .env.production
    command:
      [
        "postgres",
        "-c", "shared_buffers=128MB",
        "-c", "work_mem=4MB",
        "-c", "maintenance_work_mem=64MB",
        "-c", "effective_cache_size=256MB",
        "-c", "max_connections=50",
      ]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - /srv/rvdc_backend/go2rtc:/config
    deploy:
      resources:
        limits:
          memory: 128M
