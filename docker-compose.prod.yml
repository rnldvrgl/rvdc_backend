services:
    api:
        image: rnldvrgl/rvdc_backend:latest
        env_file:
            - .env.production
        command:
            [
                "gunicorn",
                "config.wsgi:application",
                "--bind",
                "0.0.0.0:8000",
                "--workers",
                "2",
                "--threads",
                "2",
                "--timeout",
                "120",
                "--graceful-timeout",
                "30",
                "--max-requests",
                "1000",
                "--max-requests-jitter",
                "50",
                "--access-logfile",
                "-",
                "--error-logfile",
                "-",
                "--log-level",
                "info",
            ]
        volumes:
            - /srv/rvdc_backend/staticfiles:/usr/src/app/staticfiles
            - /srv/rvdc_backend/media:/usr/src/app/media
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M

    db:
        image: postgres:16
        env_file:
            - .env.production
        volumes:
            - postgres_data:/var/lib/postgresql/data
        command:
            [
                "postgres",
                "-c", "shared_buffers=128MB",
                "-c", "work_mem=4MB",
                "-c", "maintenance_work_mem=64MB",
                "-c", "effective_cache_size=256MB",
                "-c", "max_connections=50",
            ]
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-rvdc_owner}"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M

volumes:
    postgres_data:
