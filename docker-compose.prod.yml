services:
    api:
        image: rnldvrgl/rvdc_backend:latest
        env_file:
            - .env.production
        command:
            [
                "gunicorn",
                "config.wsgi:application",
                "--bind",
                "0.0.0.0:8000",
                "--workers",
                "2",
                "--threads",
                "2",
                "--timeout",
                "60",
            ]

    db:
        image: postgres:16
        env_file:
            - .env.production
