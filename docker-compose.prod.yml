services:
    api:
        image: rnldvrgl/rvdc_backend:latest
        env_file:
            - .env.production
        command:
            [
                "daphne",
                "-b",
                "0.0.0.0",
                "-p",
                "8000",
                "--access-log",
                "-",
                "--verbosity",
                "1",
                "config.asgi:application",
            ]
        volumes:
            - /srv/rvdc_backend/staticfiles:/usr/src/app/staticfiles
            - /srv/rvdc_backend/media:/usr/src/app/media
            - /var/run/docker.sock:/var/run/docker.sock
            - /var/log:/host-logs
            - /srv/rvdc_backend/go2rtc:/go2rtc-config
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits:
                    memory: 64M

    db:
        image: postgres:16
        env_file:
            - .env.production
        volumes:
            - postgres_data:/var/lib/postgresql/data
        command:
            [
                "postgres",
                "-c", "shared_buffers=128MB",
                "-c", "work_mem=4MB",
                "-c", "maintenance_work_mem=64MB",
                "-c", "effective_cache_size=256MB",
                "-c", "max_connections=50",
            ]
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-rvdc_owner} -d $${DB_NAME:-rvdc_db}"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M

    go2rtc:
        image: alexxit/go2rtc:latest
        restart: unless-stopped
        ports:
            # Bind to localhost only — nginx proxies this over HTTPS
            - "127.0.0.1:19840:1984"
        volumes:
            - /srv/rvdc_backend/go2rtc:/config
        deploy:
            resources:
                limits:
                    memory: 128M

volumes:
    postgres_data:
